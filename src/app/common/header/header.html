<header class="navi-bar fixed-top">

              <li>
                <a class="dropdown-item" routerLink="/sp-series">SP Series</a>

              <li>
                <a class="dropdown-item" routerLink="/unicorn-series">Unicorn Series</a>

                <a class="dropdown-item" routerLink="/commuter-series">Commuter Series</a>
              </li>

          </li>
          <li class="nav-item dropdown">
            <a

              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Scooters
            </a>

            <ul class="dropdown-menu">
              <li>
                <a class="dropdown-item" routerLink="/activa-series"> Activa Series </a>

              <li>
                <a class="dropdown-item" routerLink="/dio-series"> Dio Series </a>
              </li>
            </ul>

            <a class="nav-link" routerLink="/test-drive" routerLinkActive="active"> Test Drive </a>

            <a

              href="#"

              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              More
            </a>

            <ul class="dropdown-menu" aria-labelledby="moreDropdown">
              <li>
                <a class="dropdown-item" routerLink="/blog" routerLinkActive="active"> Blogs </a>
              </li>

            </ul>
          </li>
